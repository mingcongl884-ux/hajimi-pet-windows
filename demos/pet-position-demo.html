<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>哈基Mi 位置 Demo</title>
    <style>
      :root {
        --pet-x: 55;
        --pet-y: 43;
        --pet-scale: 0.82;
        --bubble-dx: -338;
        --bubble-dy: -144;
        --bubble-width: 410;
        --bubble-height: 86;
        --ink: #161616;
        --muted: #777;
        --line: #e8e4df;
        --soft: #f7f5f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #3c3d3d;
        color: var(--ink);
        font-family:
          "Microsoft YaHei UI",
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      .stage {
        position: relative;
        width: min(100vw, 2048px);
        height: 100vh;
        min-height: 820px;
        margin: 0 auto;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.34) 0 178px, transparent 178px calc(100% - 178px), rgba(0, 0, 0, 0.34) calc(100% - 178px)),
          #fff;
      }

      .codex-top {
        position: absolute;
        left: 178px;
        right: 178px;
        top: 0;
        height: 126px;
        background: linear-gradient(180deg, #eef5f6 0, #f8f6f2 72px, rgba(255, 255, 255, 0.96) 72px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      .side-tool {
        position: absolute;
        right: 34px;
        top: 78px;
        display: grid;
        gap: 58px;
        color: rgba(255, 255, 255, 0.66);
        font-size: 22px;
        text-align: center;
      }

      .side-tool span {
        display: block;
        width: 76px;
      }

      .content {
        position: absolute;
        left: clamp(300px, 31vw, 636px);
        right: clamp(260px, 14vw, 292px);
        top: 130px;
        bottom: 0;
        overflow: hidden;
      }

      .message {
        width: min(100%, 1120px);
        margin: 0 auto;
        padding: 0 0 44px;
      }

      .frame-strip {
        display: flex;
        gap: 8px;
        width: 300px;
        height: 96px;
        margin: 0 0 22px;
        opacity: 0.56;
        overflow: hidden;
      }

      .mini-frame,
      .pet-sprite {
        background-image: url("../assets/pets/xiaomi/spritesheet.webp");
        background-repeat: no-repeat;
        background-size: 800% 900%;
      }

      .mini-frame {
        width: 64px;
        height: 70px;
        flex: 0 0 auto;
      }

      .mini-frame:nth-child(2) {
        background-position: -100% 0;
      }

      .mini-frame:nth-child(3) {
        background-position: -200% 0;
      }

      .mini-frame:nth-child(4) {
        background-position: -300% 0;
      }

      .command-line,
      .divider-label,
      .paragraph {
        color: #a7a29c;
      }

      .command-line {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 16px 0 44px;
        font-size: 20px;
      }

      .command-line::before {
        content: "";
        width: 20px;
        height: 20px;
        border: 2px solid #d4d0ca;
        border-radius: 6px;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 20px 0 42px;
        color: #999;
        font-size: 19px;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        flex: 1;
        background: #ece9e3;
      }

      .user-bubble {
        width: max-content;
        max-width: 620px;
        margin: 0 0 28px auto;
        padding: 12px 20px;
        border-radius: 18px;
        background: #f1f0ee;
        color: #6b6864;
        font-size: 21px;
      }

      .paragraph {
        max-width: 980px;
        margin: 28px 0;
        font-size: 21px;
        line-height: 1.75;
      }

      .target-box {
        position: absolute;
        left: calc(var(--pet-x) * 1% + -376px);
        top: calc(var(--pet-y) * 1% + -88px);
        width: 344px;
        height: 88px;
        border: 4px solid rgba(255, 64, 70, 0.92);
        pointer-events: none;
      }

      .pet-anchor {
        position: absolute;
        left: calc(var(--pet-x) * 1%);
        top: calc(var(--pet-y) * 1%);
        width: 0;
        height: 0;
      }

      .pet-sprite {
        width: calc(192px * var(--pet-scale));
        height: calc(208px * var(--pet-scale));
        transform: translate(-50%, -48%);
        filter: none;
      }

      .pet-bubble {
        position: absolute;
        left: calc(var(--bubble-dx) * 1px);
        top: calc(var(--bubble-dy) * 1px);
        width: calc(var(--bubble-width) * 1px);
        min-height: calc(var(--bubble-height) * 1px);
        padding: 18px 44px 18px 22px;
        border: 1px solid #e7e2dc;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.1);
        color: #595653;
        font-size: 18px;
        line-height: 1.45;
      }

      .pet-bubble::after {
        content: "";
        position: absolute;
        right: -12px;
        top: 28px;
        width: 22px;
        height: 22px;
        background: inherit;
        border-top: 1px solid #e7e2dc;
        border-right: 1px solid #e7e2dc;
        transform: rotate(45deg);
      }

      .pet-bubble button {
        position: absolute;
        right: 12px;
        top: 12px;
        width: 24px;
        height: 24px;
        border: 0;
        background: transparent;
        color: #aaa39b;
        font-size: 24px;
        line-height: 20px;
      }

      .panel {
        position: fixed;
        left: 22px;
        bottom: 22px;
        width: 360px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 14px;
        background: rgba(25, 25, 25, 0.82);
        color: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(18px);
      }

      .panel h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 700;
      }

      .presets {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 12px;
      }

      .presets button,
      .copy {
        height: 34px;
        border: 0;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.13);
        color: white;
        font-weight: 650;
      }

      .presets button.active,
      .copy:hover {
        background: white;
        color: #171717;
      }

      label {
        display: grid;
        grid-template-columns: 92px 1fr 46px;
        align-items: center;
        gap: 9px;
        margin: 8px 0;
        font-size: 12px;
      }

      input[type="range"] {
        width: 100%;
      }

      output {
        color: rgba(255, 255, 255, 0.62);
        text-align: right;
      }

      .readout {
        margin: 10px 0 0;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.72);
        font-family: "Cascadia Mono", Consolas, monospace;
        font-size: 11px;
        line-height: 1.55;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="codex-top"></div>
      <aside class="side-tool">
        <span>操作</span>
        <span>键盘</span>
        <span>显示桌面</span>
        <span>展示所有窗口</span>
      </aside>

      <section class="content">
        <div class="message">
          <div class="frame-strip" aria-hidden="true">
            <div class="mini-frame"></div>
            <div class="mini-frame"></div>
            <div class="mini-frame"></div>
            <div class="mini-frame"></div>
          </div>
          <div class="command-line">已运行 2 条命令</div>
          <div class="divider">上下文已自动压缩</div>
          <div class="user-bubble">这是和小咪的素材是和codex一样的，应该不是素材问题</div>
          <p class="paragraph">
            我接着查这个阴影问题。现在看起来主要不是小咪素材没抠干净，而是宠物画布本身加了一层 CSS
            drop-shadow，所以无论素材多干净都会在周围泛出一圈影子。
          </p>
          <div class="command-line">已运行 3 条命令</div>
          <p class="paragraph">
            对，你这个判断是准的。小咪素材和 Codex 那套一样，真正多出来的是我们这边渲染层又叠了一层 filter。
          </p>
        </div>
      </section>

      <div class="target-box" aria-hidden="true"></div>
      <div class="pet-anchor">
        <div class="pet-bubble">
          <button aria-label="关闭">×</button>
          早上好呀，9:40 了。先把今天最重要的一件事放到最前面。
        </div>
        <div class="pet-sprite" aria-label="哈基Mi"></div>
      </div>
    </main>

    <section class="panel">
      <h1>位置 demo，仅用于确认</h1>
      <div class="presets">
        <button data-preset="codex" class="active">Codex感</button>
        <button data-preset="left">红框偏左</button>
        <button data-preset="loose">更松一点</button>
      </div>
      <label>宠物 X <input id="petX" type="range" min="42" max="68" step="0.5" value="55" /><output id="petXOut"></output></label>
      <label>宠物 Y <input id="petY" type="range" min="32" max="58" step="0.5" value="43" /><output id="petYOut"></output></label>
      <label>气泡左移 <input id="bubbleDx" type="range" min="-470" max="-120" step="2" value="-338" /><output id="bubbleDxOut"></output></label>
      <label>气泡上移 <input id="bubbleDy" type="range" min="-240" max="-40" step="2" value="-144" /><output id="bubbleDyOut"></output></label>
      <label>气泡宽度 <input id="bubbleWidth" type="range" min="300" max="520" step="2" value="410" /><output id="bubbleWidthOut"></output></label>
      <button class="copy" id="copy">复制当前参数</button>
      <div class="readout" id="readout"></div>
    </section>

    <script>
      const presets = {
        codex: { petX: 55, petY: 43, bubbleDx: -338, bubbleDy: -144, bubbleWidth: 410 },
        left: { petX: 55, petY: 43, bubbleDx: -392, bubbleDy: -124, bubbleWidth: 344 },
        loose: { petX: 55.5, petY: 45, bubbleDx: -366, bubbleDy: -166, bubbleWidth: 390 }
      };

      const fields = ["petX", "petY", "bubbleDx", "bubbleDy", "bubbleWidth"];
      const root = document.documentElement;
      const readout = document.getElementById("readout");

      function applyState(next) {
        for (const key of fields) {
          const input = document.getElementById(key);
          if (next[key] !== undefined) input.value = next[key];
          const value = Number(input.value);
          root.style.setProperty(`--${key.replace(/[A-Z]/g, (m) => `-${m.toLowerCase()}`)}`, value);
          document.getElementById(`${key}Out`).textContent = value;
        }
        readout.textContent = fields.map((key) => `${key}: ${document.getElementById(key).value}`).join(", ");
      }

      for (const key of fields) {
        document.getElementById(key).addEventListener("input", () => {
          document.querySelectorAll("[data-preset]").forEach((button) => button.classList.remove("active"));
          applyState({});
        });
      }

      document.querySelectorAll("[data-preset]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-preset]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          applyState(presets[button.dataset.preset]);
        });
      });

      document.getElementById("copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(readout.textContent);
      });

      applyState(presets.codex);
    </script>
  </body>
</html>
