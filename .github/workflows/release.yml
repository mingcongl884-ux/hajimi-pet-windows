name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --run

      - name: Build installer
        run: npm run package:installer

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HaJiMi-Setup-*.exe
            dist/HaJiMi-Setup-*.exe.blockmap
            dist/latest.yml
